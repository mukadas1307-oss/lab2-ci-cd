name: CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app  # Все команды будут выполняться в папке app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: pytest test_calculator.py -v
      
      - name: Test successful message
        if: success()
        run: echo "✅ Все тесты пройдены успешно!"
      
      - name: Test failed message
        if: failure()
        run: echo "❌ Некоторые тесты не пройдены. Проверьте код!"

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Запустится только после успешного test
    if: github.ref == 'refs/heads/main' && success()
    defaults:
      run:
        working-directory: ./app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './app'  # Папка с HTML файлом
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
      
      - name: Deploy success message
        run: echo "✅ Сайт успешно развернут на GitHub Pages!"