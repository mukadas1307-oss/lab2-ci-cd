name: CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Тоже обновим до v4
      
      - name: Set up Python
        uses: actions/setup-python@v5  # И это до v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: pytest test_calculator.py -v
      
      - name: Test successful message
        if: success()
        run: echo "✅ Все тесты пройдены успешно!"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && success()
    defaults:
      run:
        working-directory: ./app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4  # Обновлено до v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # ГЛАВНОЕ ИЗМЕНЕНИЕ!
        with:
          path: './app'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4  # ГЛАВНОЕ ИЗМЕНЕНИЕ!
      
      - name: Deploy success message
        run: echo "✅ Сайт успешно развернут на GitHub Pages!"